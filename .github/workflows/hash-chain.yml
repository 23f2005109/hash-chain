name: Secret Hash Chain

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Compute hash 9f62b52e
        run: |
          echo -n "${{ secrets.MY_SECRET }}github-verified" | sha256sum | cut -c1-10 > verify_hash.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-hash-9f62b52e
          path: verify_hash.txt
